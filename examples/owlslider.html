<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Owl Carousel Demo</title>

  <!-- Owl Carousel CSS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/owl.carousel@2.3.4/dist/assets/owl.carousel.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/owl.carousel@2.3.4/dist/assets/owl.theme.default.min.css">

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      padding: 40px;
    }

    .owl-carousel .item img {
      width: 100%;
      border-radius: 8px;
    }

.owl-carousel {
  position: relative;
}

.owl-nav button {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  background: rgba(0, 0, 0, 0.5) !important;
  color: #fff !important;
  border: none;
  font-size: 30px;
  width: 50px;
  height: 50px;
  border-radius: 50%;
  cursor: pointer;
}

.owl-nav .owl-prev {
  left: -25px;   /* adjust if needed */
}

.owl-nav .owl-next {
  right: -25px;  /* adjust if needed */
}

.owl-nav button:hover {
  background: rgba(0, 0, 0, 0.8) !important;
}    
  </style>
</head>

<body>

  <h2 style="text-align:center">Simple Owl Carousel</h2>

  <div class="owl-carousel">
    <div class="item"><img src="https://picsum.photos/800/300?1"></div>
    <div class="item"><img src="https://picsum.photos/800/300?2"></div>
    <div class="item"><img src="https://picsum.photos/800/300?3"></div>
    <div class="item"><img src="https://picsum.photos/800/300?4"></div>
  </div>

  <!-- jQuery -->
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

  <!-- Owl Carousel JS -->
  <script src="https://cdn.jsdelivr.net/npm/owl.carousel@2.3.4/dist/owl.carousel.min.js"></script>

  <script>
$('.owl-carousel').owlCarousel({
  loop: false,
  margin: 10,
  nav: true,
  dots: true,
  autoplay: false,
  items: 1,
  navText: [
    '<span class="owl-prev-btn">&#10094;</span>',
    '<span class="owl-next-btn">&#10095;</span>'
  ]
});
  </script>

</body>
</html>
