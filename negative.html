<!doctype html>
<html class="" lang="en" dir="ltr">
   <head>
		<title>Negative numbers</title>

		<style>
			body{text-align:center}
			#container{width:760px;margin:0 auto; text-align:left ;overflow:hidden}	
		</style>			
	</head>
	<body>
		<div id="container">

			<div><a href="https://www.paypal.com">paypal</a></div>

			<div style="max-width: 300px;border: 1px #aabbdd solid">
				<span>PayPal Balance</span> &nbsp;&nbsp;&nbsp;
				<span>-$102.07</span>
			</div>
			<div style="max-width: 300px;border: 1px #aabbdd solid">
				<span>PayPal Balance - Negative as part of balance</span> &nbsp;&nbsp;&nbsp;
				<span>$-102.07</span>
			</div>
			<div style="max-width: 300px;border: 1px #aabbdd solid">
				<span>PayPal Balance - Unicode</span> &nbsp;&nbsp;&nbsp;
				<span> &minus;$102.07</span>
			</div>				
	</div>
	</body>
</html>
